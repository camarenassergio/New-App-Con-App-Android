<div class="notif-dropdown-header d-flex justify-content-between align-items-center p-3 border-bottom grad-primary text-white">
    <h6 class="mb-0 fw-bold"><i class="fas fa-bell me-2"></i>Notificaciones</h6>
    {% if notificaciones %}
    <button class="btn btn-sm btn-glass-white rounded-pill px-3 py-0 text-decoration-none x-small fw-bold" 
            hx-post="{% url 'dashboard:notificaciones_marcar_todas_leidas' %}"
            hx-target="#notif-dropdown-content"
            hx-swap="innerHTML">
        Leídos
    </button>
    {% endif %}
</div>

<div class="notif-list-dropdown" style="max-height: 400px; overflow-y: auto;">
    {% for n in notificaciones %}
    <div class="notif-item-dropdown p-3 border-bottom {% if not n.leido %}unread{% endif %}" 
         onclick="window.location.href='{% url 'dashboard:notificaciones_list' %}?id={{ n.pk }}'"
         style="transition: background 0.2s; position: relative; cursor: pointer;">
        
        <div class="notif-content-sm min-width-0">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <div class="d-flex align-items-center gap-2">
                    <i class="{{ n.icono|default:'fas fa-bell' }} {% if n.tipo == 'ALERTA' %}text-danger{% elif n.tipo == 'PEDIDO' %}text-warning{% else %}text-primary{% endif %} smaller opacity-75"></i>
                    <span class="notif-title-sm fw-bold small text-dark d-block text-truncate">{{ n.titulo }}</span>
                </div>
                <span class="notif-time-sm text-muted" style="font-size: 0.7rem;">{{ n.fecha_creacion|timesince }}</span>
            </div>
            <p class="notif-desc-sm mb-0 text-muted small" style="line-height: 1.3; font-size: 0.8rem; white-space: pre-wrap;">{{ n.descripcion }}</p>
        </div>
        
        {% if not n.leido %}
        <span class="unread-dot-sm"></span>
        {% endif %}
    </div>
    {% empty %}
    <div class="p-5 text-center text-muted">
        <div class="mb-3">
            <span class="empty-notif-icon-sm">
                <i class="fas fa-check-double"></i>
            </span>
        </div>
        <p class="small fw-bold mb-1">¡Todo al día!</p>
        <p class="x-small mb-0 opacity-75">No hay mensajes pendientes.</p>
    </div>
    {% endfor %}
</div>

<div class="p-2 text-center border-top bg-light">
    <a href="{% url 'dashboard:notificaciones_list' %}" class="x-small text-decoration-none fw-bold text-primary text-uppercase tracking-wider">
        Ver historial completo <i class="fas fa-arrow-right ms-1"></i>
    </a>
</div>

<style>
    .grad-primary { background: linear-gradient(135deg, var(--primary-blue), #1e3c72) !important; }
    .btn-glass-white { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; }
    
    .notif-item-dropdown:hover {
        background: rgba(var(--primary-rgb), 0.03);
    }
    .notif-item-dropdown.unread {
        background: rgba(var(--primary-rgb), 0.06);
    }

    .unread-dot-sm {
        position: absolute; 
        top: 18px; 
        right: 12px; 
        width: 8px; 
        height: 8px; 
        background: var(--primary-blue); 
        border-radius: 50%;
        box-shadow: 0 0 5px rgba(0, 59, 112, 0.4);
    }

    .empty-notif-icon-sm {
        font-size: 2rem;
        color: var(--success);
        opacity: 0.2;
    }

    .x-small { font-size: 0.72rem; }
    .smaller { font-size: 0.8rem; }
    .tracking-wider { letter-spacing: 0.05em; }

    body.dark-theme .notif-title-sm { color: #f8fafc !important; }
    body.dark-theme .notif-item-dropdown:hover { background: rgba(255,255,255, 0.04); }
    body.dark-theme .notif-item-dropdown.unread { background: rgba(var(--primary-blue-rgb), 0.15); }
    body.dark-theme .bg-light { background: rgba(0,0,0,0.2) !important; }
</style>
