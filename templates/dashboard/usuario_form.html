{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Crear Nuevo Usuario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm" style="border-radius: 12px; border: none;">
            <div class="card-header bg-white" style="border-bottom: 1px solid #f0f0f0; padding: 20px;">
                <h5 class="mb-0" style="color: var(--primary-blue); font-weight: 700;">
                    <i class="fas fa-user-plus" style="margin-right: 10px; color: var(--primary-orange);"></i>
                    Registro de Personal
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4 gap-2">
                        <button type="submit" class="btn btn-primary btn-lg" style="background-color: var(--primary-orange); border: none;">
                            <i class="fas fa-save me-2"></i> Crear Usuario
                        </button>
                        <a href="{% url 'dashboard:usuarios_list' %}" class="btn btn-light text-muted">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
