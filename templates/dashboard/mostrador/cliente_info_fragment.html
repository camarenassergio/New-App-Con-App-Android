<div class="alert alert-success border-0 py-2 px-3 mb-0 d-flex align-items-center" style="border-radius: 8px;">
    <i class="fas fa-check-circle me-2"></i>
    <div>
        <div class="fw-bold small">{{ cliente.razon_social }}</div>
        <div class="text-muted" style="font-size: 0.75rem;">Cliente vinculado: <strong>{{ cliente.id_sae }}</strong></div>
    </div>
    {% if not cliente.telefono_principal %}
    <div class="ms-auto">
        <button type="button" class="btn btn-warning btn-sm rounded-pill fw-bold" 
                hx-get="{% url 'dashboard:cliente_update_telefono_modal' cliente.pk %}"
                hx-target="#modal-container">
            <i class="fas fa-phone-slash me-1"></i> Falta Teléfono
        </button>
    </div>
    {% endif %}
    <input type="hidden" id="detected-cliente-id" value="{{ cliente.pk }}">
    <input type="hidden" id="detected-cliente-sae" value="{{ cliente.id_sae }}">
    <input type="hidden" id="detected-cliente-name" value="{{ cliente.razon_social }}">
    <input type="hidden" id="detected-cliente-phone" value="{{ cliente.telefono_principal|default:'' }}">
</div>
