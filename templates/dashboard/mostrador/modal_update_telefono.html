<div class="modal fade" id="modalUpdatePhone" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
<div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
        <div class="modal-header bg-warning border-0 p-4" style="border-radius: 20px 20px 0 0;">
            <div class="d-flex align-items-center">
                <div class="bg-white rounded-circle p-2 me-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 48px; height: 48px;">
                    <i class="fas fa-phone-alt text-warning fs-4"></i>
                </div>
                <div>
                    <h5 class="modal-title fw-bold text-dark mb-0">Completar Datos del Cliente</h5>
                    <p class="small text-dark-50 mb-0 opacity-75">El cliente no tiene teléfono registrado</p>
                </div>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form hx-post="{% url 'dashboard:cliente_update_telefono_modal' cliente.pk %}" 
              hx-target="#modal-phone-error"
              class="modal-body p-4">
            {% csrf_token %}
            
            <div class="alert alert-info border-0 rounded-4 p-3 mb-4 d-flex align-items-center">
                <i class="fas fa-user-circle fs-3 me-3 opacity-25"></i>
                <div>
                    <h6 class="mb-0 fw-bold">{{ cliente.razon_social }}</h6>
                    <span class="x-small">ID SAE: <strong>{{ cliente.id_sae|default:"Local" }}</strong></span>
                </div>
            </div>

            <div class="form-group mb-4">
                <label class="form-label fw-bold small text-uppercase text-muted">Número de Teléfono (10 dígitos)</label>
                <div class="input-group shadow-sm border rounded-pill overflow-hidden bg-white">
                    <span class="input-group-text bg-light border-0 px-3">
                        <i class="fas fa-mobile-alt text-primary"></i>
                    </span>
                    <input type="text" name="telefono" id="id_new_phone" class="form-control border-0 py-2 ps-2" 
                           placeholder="Ej. 55-XXXX-XXXX" required autofocus
                           maxlength="14">
                </div>
                <div id="modal-phone-error" class="mt-2 animate__animated animate__shakeX"></div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary py-3 rounded-pill fw-bold shadow-sm">
                    GUARDAR Y CONTINUAR <i class="fas fa-save ms-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
</div>

<script>
    (function() {
        const input = document.getElementById('id_new_phone');
        if (input) {
            const format = (v) => v.replace(/\D/g, '').slice(0, 10).match(/.{1,2}/g)?.join('-') || v.replace(/\D/g, '');
            input.addEventListener("input", function() {
                this.value = format(this.value);
            });
        }
        
        // Auto-mostrar modal al cargar
        const modalEl = document.getElementById('modalUpdatePhone');
        if (modalEl) {
            const modal = new bootstrap.Modal(modalEl);
            modal.show();
        }
    })();
</script>
