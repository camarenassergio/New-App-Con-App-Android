<div class="modal fade" id="buscadorClienteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-bold"><i class="fas fa-search me-2"></i> BUSCADOR SIMPLE</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                
                {# ── INPUT DE BÚSQUEDA ── #}
                <div class="input-group mb-4 shadow-sm border rounded">
                    <span class="input-group-text bg-white border-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" name="q" id="q-search-direct" class="form-control border-0 py-2 fs-5" 
                           placeholder="Buscar por Nombre o ID SAE..." 
                           hx-get="{% url 'dashboard:cliente_buscador_accion' %}"
                           hx-target="#resultados-simples"
                           hx-trigger="keyup changed delay:400ms, search"
                           autocomplete="off">
                    <button class="btn btn-dark px-4 fw-bold" 
                            hx-get="{% url 'dashboard:cliente_buscador_accion' %}"
                            hx-target="#resultados-simples"
                            hx-include="#q-search-direct">
                        BUSCAR
                    </button>
                </div>

                {# ── ZONA DE RESULTADOS ── #}
                <div id="resultados-simples" class="bg-light border rounded overflow-auto" style="min-height: 300px; max-height: 450px;">
                    <div class="p-5 text-center text-muted">
                        <i class="fas fa-keyboard fa-2x mb-2"></i>
                        <p>Escriba para ver resultados...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <script>
        var modalEl = document.getElementById('buscadorClienteModal');
        var bsModal = new bootstrap.Modal(modalEl);
        bsModal.show();
        setTimeout(() => document.getElementById('q-search-direct').focus(), 300);
    </script>
</div>
