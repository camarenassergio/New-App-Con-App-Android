<div class="list-group list-group-flush shadow-sm">
    {% for res in resultados %}
    <button type="button" class="list-group-item list-group-item-action p-3 border-bottom hover-light"
            onclick="seleccionarResultado('{{ res.cliente.pk }}', '{{ res.cliente.id_sae|default:''|escapejs }}', '{{ res.cliente.razon_social|escapejs }}', '')"
            style="background: white !important;">
        <div class="d-flex justify-content-between align-items-center">
            <div class="flex-grow-1">
                <div class="d-flex align-items-center mb-1">
                    <span class="badge bg-dark me-2 font-monospace">{{ res.cliente.id_sae|default:'S/ID' }}</span>
                    <h6 class="mb-0 fw-bold text-dark text-uppercase fs-6">{{ res.cliente.razon_social }}</h6>
                </div>
                <div class="small text-muted border-start border-primary ps-2 ms-1">
                    {% with obras=res.cliente.obras.all %}
                        {% if obras %}
                            <i class="fas fa-map-marker-alt me-1 text-primary small"></i>
                            {{ obras.0.alias }} — {{ obras.0.colonia|default:'Sin colonia' }}
                        {% else %}
                            <i class="fas fa-exclamation-triangle me-1 text-warning small"></i>
                            Sin obras registradas.
                        {% endif %}
                    {% endwith %}
                </div>
            </div>
            <div class="ms-3 text-primary opacity-50">
                <i class="fas fa-arrow-right"></i>
            </div>
        </div>
    </button>
    {% empty %}
    <div class="p-5 text-center text-muted">
        {% if query %}
            <i class="fas fa-search-minus fa-3x opacity-25 mb-3"></i>
            <p>No se encontraron resultados para "<strong>{{ query }}</strong>"</p>
        {% else %}
            <p>Escriba al menos 1 letra...</p>
        {% endif %}
    </div>
    {% endfor %}
</div>

<script>
    function seleccionarResultado(clienteId, idSae, razonSocial, obraId) {
        // Disparar evento global para el pedido_form.html
        document.dispatchEvent(new CustomEvent('clienteSeleccionado', {
            detail: { clienteId, idSae, razonSocial, obraId }
        }));

        // Si existe el input de ID SAE en el formulario principal, lo rellenamos
        const mainInput = document.querySelector('input[name="id_sae_search"]');
        if (mainInput) {
            mainInput.value = idSae;
        }

        // Cerramos el modal
        const modalEl = document.getElementById('buscadorClienteModal');
        if (modalEl) {
            const modal = bootstrap.Modal.getInstance(modalEl);
            if (modal) modal.hide();
        }
    }
</script>

<style>
    .hover-light:hover {
        background-color: #f0f7ff !important;
        cursor: pointer;
    }
</style>
