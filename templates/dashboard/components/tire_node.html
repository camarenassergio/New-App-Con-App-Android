{% comment %}
    Component for a tire node in the fleet visualizer.
    Usage: {% include 'dashboard/components/tire_node.html' with tire=llanta_obj pos='POS' label='LABEL' dual=True/False %}
{% endcomment %}

<div class="text-center">
    <a href="{% if tire %}{% url 'dashboard:inventario_llanta_update' tire.id %}{% else %}{% url 'dashboard:inventario_llanta_create' %}?unidad={{ unidad.id }}&posicion={{ pos }}{% endif %}" 
       class="tire-link d-inline-block transition-all hover-scale" 
       style="text-decoration: none;">
        <div title="{% if tire %}{{ tire.marca }} - {{ tire.profundidad }}mm{% else %}Sin registrar{% endif %}" 
             class="tire-node rounded-3 shadow-sm d-flex flex-column justify-content-center align-items-center fw-800 text-white 
             {% if tire %}bg-{{ tire.estado }}{% else %}bg-secondary{% endif %} {% if dual %}dual-shadow{% endif %}" 
             style="width: 50px; height: 95px; border: 2px solid rgba(0,0,0,0.1); position: relative; overflow: hidden;">
            
            {% if tire %}
                <span class="fs-6 d-block">{{ tire.profundidad|floatformat:0 }}</span>
                <span class="x-small opacity-75 text-uppercase" style="font-size: 0.55rem;">mm</span>
                
                <!-- TREAD PATTERN EFFECT -->
                <div class="tread-lines position-absolute w-100 h-100 opacity-10 pointer-events-none" style="top:0; left:0; background: repeating-linear-gradient(0deg, #000, #000 2px, transparent 2px, transparent 6px);"></div>
            {% else %}
                <i class="fas fa-plus opacity-50"></i>
            {% endif %}
        </div>
        <small class="text-muted fw-800 d-block mt-2 x-small tracking-wider text-uppercase">{{ label }}</small>
    </a>
</div>

<style>
    .tire-node { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .tire-link:hover .tire-node { border-color: rgba(255,255,255,0.5) !important; box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; }
    .dual-shadow { box-shadow: 5px 0 0 rgba(0,0,0,0.1); }
</style>
