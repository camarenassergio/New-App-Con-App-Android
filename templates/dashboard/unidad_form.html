{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Registrar Nueva Unidad{% endblock %}

{% block content %}
<div class="form-container">
    <div style="margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
        <h3>Datos del Vehículo</h3>
        <p style="color: var(--text-muted);">Ingrese la información normalizada (Año a 4 dígitos, Marca, Submarca).</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        
        <div style="margin-top: 32px; display: flex; gap: 16px;">
            <button type="submit" class="btn-primary">Guardar Unidad</button>
            <a href="{% url 'dashboard:unidades_list' %}" style="padding: 10px 20px; color: var(--text-muted); text-decoration: none;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
