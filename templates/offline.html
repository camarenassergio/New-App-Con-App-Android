{% extends 'base.html' %}

{% block page_title %}Sin Conexión{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card border-0 shadow-premium p-5" style="border-radius: 30px;">
                <div class="empty-state">
                    <div class="mb-4">
                        <i class="fas fa-wifi-slash text-muted" style="font-size: 6rem; opacity: 0.3;"></i>
                    </div>
                    <h2 class="fw-bold mb-3">Estás fuera de línea</h2>
                    <p class="text-muted mb-4 fs-5">
                        Parece que no tienes conexión a internet en este momento. 
                        Algunas funciones del sistema de logística no estarán disponibles hasta que recuperes la señal.
                    </p>
                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                        <button onclick="window.location.reload()" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-sync-alt me-2"></i>REINTENTAR CONEXIÓN
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
