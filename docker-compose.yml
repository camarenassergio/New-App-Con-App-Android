services:
  # --- DEV ENVIRONMENT (Port 8000, DB lupita_dev) ---
  db-dev:
    image: mysql:9.4
    container_name: lupita_db_dev
    env_file: .env
    environment:
      MYSQL_DATABASE: lupita_dev
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_dev:/var/lib/mysql
    security_opt:
      - no-new-privileges=false
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5


  web-dev:
    build: .
    container_name: lupita_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../New App Con App Android:/app
    ports:
      - "8000:8000"
    depends_on:
      db-dev:
        condition: service_healthy

    environment:
      - DB_HOST=db-dev
      - DB_NAME=lupita_dev
      - ENVIRONMENT=DEV
    env_file: .env
    restart: always

  # --- STEALTH ENVIRONMENT (Port 8888, DB lupita_dev) ---
  web-stealth:
    build: .
    container_name: lupita_web_stealth
    command: python manage.py runserver 0.0.0.0:8888
    volumes:
      - .:/app
    ports:
      - "8888:8888"
    depends_on:
      db-dev:
        condition: service_healthy
    environment:
      - DB_HOST=db-dev
      - DB_NAME=lupita_dev
      - ENVIRONMENT=STEALTH
    env_file: .env
    restart: always

  browser-sync:
    image: node:lts-slim
    container_name: browser-sync-stealth
    volumes:
      - .:/source
    working_dir: /source
    ports:
      - "3000:3000"
    command: npx browser-sync start --proxy "web-stealth:8888" --files "templates/**/*.html, static/**/*.css, static/**/*.js" --reload-delay 500 --reload-debounce 500 --no-open --no-ui
    depends_on:
      - web-stealth

  # --- QA ENVIRONMENT (Port 10000, DB lupita_qa) ---
  db-qa:
    image: mysql:9.4
    container_name: lupita_db_qa
    env_file: .env
    environment:
      MYSQL_DATABASE: lupita_qa
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_qa:/var/lib/mysql
    security_opt:
      - no-new-privileges=false
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5


  web-qa:
    build: .
    container_name: lupita_web_qa
    command: python manage.py runserver 0.0.0.0:10000
    volumes:
      - .:/app
    ports:
      - "10000:10000"
    depends_on:
      db-qa:
        condition: service_healthy

    environment:
      - DB_HOST=db-qa
      - DB_NAME=lupita_qa
      - ENVIRONMENT=QA
    env_file: .env
    restart: always

volumes:
  mysql_data_dev:
  mysql_data_qa:
